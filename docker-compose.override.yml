# Auto-loaded by `docker compose up` for local development.
# Adds bind mounts + hot reload so code changes don't require a rebuild.
services:
  backend:
    build:
      target: deps
    command: npm run dev
    environment:
      NODE_ENV: development
      # Docker Desktop's gRPC-FUSE bind mounts don't reliably deliver inotify
      # events, so tsx's default file watcher can silently miss edits (see
      # decisions/ for the incident this was found in). Force polling instead.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - /var/run/docker.sock:/var/run/docker.sock
      - ./challenges:/app/challenges:ro

  frontend:
    build:
      target: deps
    command: npm run dev -- --host
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
