# Auto-loaded by `docker compose up` for local development.
# Adds bind mounts + hot reload so code changes don't require a rebuild.
services:
  backend:
    build:
      target: deps
    # NOTE: dev uses tsx's file watcher for hot reload, which runs the app in a
    # child process it hard-kills on SIGTERM — so the app's graceful-shutdown
    # drain does NOT run under `docker compose down` in dev mode. That's fine:
    # boot-time orphan reconciliation (index.ts) removes any leftover challenge
    # containers on the next `docker compose up`. The graceful drain matters for
    # the production image (node as PID 1, no watcher) and is verified there.
    command: npm run dev
    stop_grace_period: 20s
    environment:
      NODE_ENV: development
      # Docker Desktop's gRPC-FUSE bind mounts don't reliably deliver inotify
      # events, so tsx's default file watcher can silently miss edits (see
      # decisions/ for the incident this was found in). Force polling instead.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - /var/run/docker.sock:/var/run/docker.sock
      - ./challenges:/app/challenges:ro

  frontend:
    build:
      target: deps
    command: npm run dev -- --host
    environment:
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
