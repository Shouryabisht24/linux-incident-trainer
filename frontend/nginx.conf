server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver. Using a variable in proxy_pass (below)
    # forces nginx to resolve "backend" lazily per-request instead of once
    # at config load — otherwise nginx refuses to start if the backend
    # container isn't up yet, or keeps a stale IP after it restarts.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri /index.html;
    }

    location /health {
        set $upstream_backend http://backend:4000;
        proxy_pass $upstream_backend/health;
        proxy_http_version 1.1;
    }

    location /api/ {
        set $upstream_backend http://backend:4000;
        proxy_pass $upstream_backend/api/;
        proxy_http_version 1.1;
    }

    location /ws/ {
        set $upstream_backend http://backend:4000;
        proxy_pass $upstream_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
