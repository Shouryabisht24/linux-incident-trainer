server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver. Using a variable in proxy_pass (below)
    # forces nginx to resolve "backend" lazily per-request instead of once
    # at config load — otherwise nginx refuses to start if the backend
    # container isn't up yet, or keeps a stale IP after it restarts.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri /index.html;
    }

    # NOTE: proxy_pass targets below deliberately omit any URI after the
    # variable. Per nginx's proxy_pass semantics, once a variable is
    # involved, pairing it with a literal URI (e.g. "$upstream_backend/api/")
    # does NOT splice the matched location prefix back in the way a
    # non-variable proxy_pass would — it replaces the *entire* request URI
    # with that literal, so a request for /api/categories was actually being
    # forwarded upstream as bare /api/, breaking every API route (and every
    # WS path) in the real production/nginx pipeline. Omitting the URI
    # entirely forwards the original request URI unchanged instead, which is
    # what we want here since Express/the WS upgrade handler already listen
    # on the exact same paths (/health, /api/*, /ws/*).
    location /health {
        set $upstream_backend http://backend:4000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
    }

    location /api/ {
        set $upstream_backend http://backend:4000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
    }

    location /ws/ {
        set $upstream_backend http://backend:4000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
